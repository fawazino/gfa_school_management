{% extends "base.html" %}

{% block title %}Fee Payment - GFA School Management{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2><i class="fas fa-money-bill-wave me-2 text-primary"></i>Record Fee Payment</h2>
    <a href="{{ url_for('fees_list') }}" class="btn btn-secondary">
        <i class="fas fa-arrow-left me-2"></i>Back
    </a>
</div>

<div class="card">
    <div class="card-header bg-success text-white">
        <i class="fas fa-credit-card me-2"></i>Payment Entry
    </div>
    <div class="card-body">
        <form method="POST" action="{{ url_for('fee_payment') }}">
            <div class="row">
                <div class="col-md-6">
                    <label class="form-label">Student <span class="text-danger">*</span></label>
                    <select name="student_id" class="form-select" id="student_select" required>
                        <option value="">Select Student</option>
                        {% for student in students %}
                        <option value="{{ student.id }}">{{ student.admission_number }} - {{ student.first_name }} {{ student.last_name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Fee Type <span class="text-danger">*</span></label>
                    <select name="fee_id" class="form-select" id="fee_select" required>
                        <option value="">Select Fee</option>
                        {% for fee in fees %}
<option value="{{ fee.id }}" data-amount="{{ fee.amount }}">{{ fee.fee_type }} - {{ fee.class_obj.name if fee.class_obj else 'N/A' }} - ₦{{ fee.amount }}</option>                        {% endfor %}
                    </select>
                </div>
            </div>

            <div class="row mt-3">
                <div class="col-md-4">
                    <label class="form-label">Amount Due (₦)</label>
                    <input type="number" name="amount_due" class="form-control" id="amount_due" readonly>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Amount Paid (₦) <span class="text-danger">*</span></label>
                    <input type="number" name="amount_paid" class="form-control" step="0.01" min="0" required>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Payment Method <span class="text-danger">*</span></label>
                    <select name="payment_method" class="form-select" required>
                        <option value="">Select Method</option>
                        <option value="Cash">Cash</option>
                        <option value="Bank Transfer">Bank Transfer</option>
                        <option value="POS">POS</option>
                        <option value="Online">Online Payment</option>
                        <option value="Cheque">Cheque</option>
                    </select>
                </div>
            </div>

            <div class="row mt-3">
                <div class="col-md-6">
                    <label class="form-label">Transaction Reference</label>
                    <input type="text" name="transaction_reference" class="form-control" placeholder="e.g., TXN123456">
                </div>
                <div class="col-md-6">
                    <label class="form-label">Remarks</label>
                    <textarea name="remarks" class="form-control" rows="1"></textarea>
                </div>
            </div>

            <div class="text-center mt-4">
                <button type="submit" class="btn btn-success btn-lg">
                    <i class="fas fa-check-circle me-2"></i>Record Payment
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    document.getElementById('fee_select').addEventListener('change', function() {
        var selectedOption = this.options[this.selectedIndex];
        var amount = selectedOption.getAttribute('data-amount');
        document.getElementById('amount_due').value = amount || '';
    });
</script>
{% endblock %}

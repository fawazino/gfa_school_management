{% extends "base.html" %}

{% block title %}Fee Setup - GFA School Management{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2><i class="fas fa-cogs me-2 text-primary"></i>School Fee Setup</h2>
    <a href="{{ url_for('fees_list') }}" class="btn btn-secondary">
        <i class="fas fa-arrow-left me-2"></i>Back
    </a>
</div>

<div class="card">
    <div class="card-header bg-primary text-white">
        <i class="fas fa-plus-circle me-2"></i>Create Fee Structure
    </div>
    <div class="card-body">
        <form method="POST" action="{{ url_for('fee_setup') }}">
            <div class="row">
                <div class="col-md-4">
                    <label class="form-label">Class <span class="text-danger">*</span></label>
                    <select name="class_id" class="form-select" required>
                        <option value="">Select Class</option>
                        {% for class in classes %}
                        <option value="{{ class.id }}">{{ class.name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Department</label>
                    <select name="department_id" class="form-select">
                        <option value="">All Departments</option>
                        {% for dept in departments %}
                        <option value="{{ dept.id }}">{{ dept.name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Session <span class="text-danger">*</span></label>
                    <select name="session_id" class="form-select" required>
                        <option value="">Select Session</option>
                        {% for sess in sessions %}
                        <option value="{{ sess.id }}">{{ sess.name }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>

            <div class="row mt-3">
                <div class="col-md-4">
                    <label class="form-label">Term <span class="text-danger">*</span></label>
                    <select name="term_id" class="form-select" required>
                        <option value="">Select Term</option>
                        {% for term in terms %}
                        <option value="{{ term.id }}">{{ term.name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Fee Type <span class="text-danger">*</span></label>
                    <select name="fee_type" class="form-select" required>
                        <option value="">Select Type</option>
                        <option value="Tuition">Tuition Fee</option>
                        <option value="Examination">Examination Fee</option>
                        <option value="Sports">Sports Fee</option>
                        <option value="Library">Library Fee</option>
                        <option value="Development Levy">Development Levy</option>
                        <option value="PTA">PTA Levy</option>
                        <option value="Medical">Medical Fee</option>
                        <option value="Others">Others</option>
                    </select>
                </div>
                <div class="col-md-4">
                    <label class="form-label">Amount (₦) <span class="text-danger">*</span></label>
                    <input type="number" name="amount" class="form-control" step="0.01" min="0" required>
                </div>
            </div>

            <div class="row mt-3">
                <div class="col-md-6">
                    <label class="form-label">Description</label>
                    <textarea name="description" class="form-control" rows="2"></textarea>
                </div>
                <div class="col-md-3">
                    <label class="form-label">Due Date</label>
                    <input type="date" name="due_date" class="form-control">
                </div>
                <div class="col-md-3">
                    <label class="form-label">Mandatory</label>
                    <div class="form-check mt-2">
                        <input type="checkbox" name="is_mandatory" class="form-check-input" checked>
                        <label class="form-check-label">Yes, this fee is mandatory</label>
                    </div>
                </div>
            </div>

            <div class="text-center mt-4">
                <button type="submit" class="btn btn-primary btn-lg">
                    <i class="fas fa-save me-2"></i>Save Fee Structure
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}

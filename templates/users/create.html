{% extends "base.html" %}

{% block title %}Create User - GFA School Management{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2><i class="fas fa-user-plus me-2 text-primary"></i>Create New User</h2>
    <a href="{{ url_for('users_list') }}" class="btn btn-secondary">
        <i class="fas fa-arrow-left me-2"></i>Back
    </a>
</div>

<div class="card">
    <div class="card-header bg-primary text-white">
        <i class="fas fa-id-card me-2"></i>User Registration Form
    </div>
    <div class="card-body">
        <form method="POST" action="{{ url_for('user_create') }}">
            <div class="row">
                <div class="col-md-6">
                    <div class="mb-3">
                        <label class="form-label">Username <span class="text-danger">*</span></label>
                        <input type="text" name="username" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Password <span class="text-danger">*</span></label>
                        <input type="password" name="password" class="form-control" required>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" name="email" class="form-control">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Phone</label>
                        <input type="tel" name="phone" class="form-control">
                    </div>
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label">Role <span class="text-danger">*</span></label>
                <select name="role" class="form-select" required>
                    <option value="">Select Role</option>
                    <option value="admin">Administrator</option>
                    <option value="principal">Principal</option>
                    <option value="teacher">Teacher</option>
                    <option value="bursar">Bursar</option>
                </select>
            </div>
            <div class="text-center mt-4">
                <button type="submit" class="btn btn-primary btn-lg">
                    <i class="fas fa-save me-2"></i>Create User
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}

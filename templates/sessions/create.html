{% extends "base.html" %}
{% block title %}Create Session{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2><i class="fas fa-plus-circle me-2 text-primary"></i>Create Academic Session</h2>
    <a href="{{ url_for('sessions_list') }}" class="btn btn-secondary"><i class="fas fa-arrow-left me-2"></i>Back</a>
</div>
<div class="card">
    <div class="card-header bg-primary text-white">New Session</div>
    <div class="card-body">
        <form method="POST" action="{{ url_for('session_create') }}">
            <div class="row">
                <div class="col-md-4">
                    <label class="form-label">Session Name *</label>
                    <input type="text" name="name" class="form-control" placeholder="e.g., 2025/2026" required>
                </div>
                <div class="col-md-3">
                    <label class="form-label">Start Date</label>
                    <input type="date" name="start_date" class="form-control">
                </div>
                <div class="col-md-3">
                    <label class="form-label">End Date</label>
                    <input type="date" name="end_date" class="form-control">
                </div>
                <div class="col-md-2">
                    <label class="form-label">Active</label>
                    <div class="form-check mt-2">
                        <input type="checkbox" name="is_active" class="form-check-input">
                        <label class="form-check-label">Set as active</label>
                    </div>
                </div>
            </div>
            <div class="text-center mt-4">
                <button type="submit" class="btn btn-primary btn-lg"><i class="fas fa-save me-2"></i>Create Session</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}

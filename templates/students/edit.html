{% extends "base.html" %}

{% block title %}Edit Student - GFA School Management{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2><i class="fas fa-edit me-2 text-primary"></i>Edit Student</h2>
    <a href="{{ url_for('students_list') }}" class="btn btn-secondary">
        <i class="fas fa-arrow-left me-2"></i>Back
    </a>
</div>

<div class="card">
    <div class="card-header bg-primary text-white">
        <i class="fas fa-user-edit me-2"></i>Edit Student Information
    </div>
    <div class="card-body">
        <form method="POST" action="{{ url_for('student_edit', student_id=student.id) }}">
            <div class="row">
                <div class="col-md-6">
                    <div class="mb-3">
                        <label class="form-label">First Name</label>
                        <input type="text" name="first_name" class="form-control" value="{{ student.first_name }}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Last Name</label>
                        <input type="text" name="last_name" class="form-control" value="{{ student.last_name }}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Sex</label>
                        <select name="sex" class="form-select">
                            <option value="Male" {% if student.sex == 'Male' %}selected{% endif %}>Male</option>
                            <option value="Female" {% if student.sex == 'Female' %}selected{% endif %}>Female</option>
                        </select>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="mb-3">
                        <label class="form-label">Class</label>
                        <select name="class_id" class="form-select">
                            {% for class in classes %}
                            <option value="{{ class.id }}" {% if student.class_id == class.id %}selected{% endif %}>{{ class.name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Status</label>
                        <select name="status" class="form-select">
                            <option value="active" {% if student.status == 'active' %}selected{% endif %}>Active</option>
                            <option value="suspended" {% if student.status == 'suspended' %}selected{% endif %}>Suspended</option>
                            <option value="withdrawn" {% if student.status == 'withdrawn' %}selected{% endif %}>Withdrawn</option>
                        </select>
                    </div>
                </div>
            </div>
            <div class="text-center mt-4">
                <button type="submit" class="btn btn-primary btn-lg">
                    <i class="fas fa-save me-2"></i>Update Student
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
